name: Propagate docs changes to all repos

on:
  push:
    branches: [main]
    paths: ['*.md']  # Only trigger when markdown files in root change
  workflow_dispatch:

jobs:
  propagate-to-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOCS_SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Propagate to backend repository
        run: |
          git clone https://x-access-token:${{ secrets.DOCS_SYNC_TOKEN }}@github.com/ademondev/test-git-submodule-back.git backend-repo
          
          # The docs live in docs/ subfolder in backend
          cp *.md backend-repo/docs/
          
          cd backend-repo
          
          if ! git diff --quiet docs/; then
            git add docs/
            git commit -m "docs: auto-update from docs repository [skip ci]"
            git push origin main
            echo "✅ Updated backend"
          else
            echo "ℹ️ Backend already up to date"
          fi

      - name: Propagate to frontend repository
        run: |
          git clone https://x-access-token:${{ secrets.DOCS_SYNC_TOKEN }}@github.com/ademondev/test-git-submodule-front.git frontend-repo
          
          # The docs live in docs/ subfolder in frontend
          cp *.md frontend-repo/docs/
          
          cd frontend-repo
          
          if ! git diff --quiet docs/; then
            git add docs/
            git commit -m "docs: auto-update from docs repository [skip ci]"
            git push origin main
            echo "✅ Updated frontend"
          else
            echo "ℹ️ Frontend already up to date"
          fi